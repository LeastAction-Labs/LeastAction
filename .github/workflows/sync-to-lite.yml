name: Run Git Sync Script

# 1. Define when this workflow runs
on:
  push:
    branches:
      - main
  workflow_dispatch: # Allows you to manually trigger it from the GitHub UI button

jobs:
  run-sync:
    # The type of virtual machine the script runs on
    runs-on: ubuntu-latest

    steps:
      # Step 1: Clone the repository files into the runner machine
      - name: Checkout repository code
        uses: actions/checkout@v4

      # Step 2: Set up the fast Python environment manager (uv)
      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      # Step 3: Run your script with required environment variables
      - name: Execute Python Script
        env:
          # Pulls the secret token securely from GitHub's vault
          GITHUB_TOKEN: ${{ secrets.SYNC_BOT_TOKEN }}
        run: |
          uv run backend/sync_script.py "c3f8b1a4"
