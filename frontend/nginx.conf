# ============================================================
# Frontend nginx — serves the built SPA and reverse-proxies
# the API + MCP endpoints to the backend, so the whole product
# is reachable from a single origin (http://<host>/).
# ============================================================
server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Allow large payloads (catalog imports, file uploads).
    client_max_body_size 100m;

    # Liveness probe for the container healthcheck.
    location = /health {
        return 200 'ok';
        add_header Content-Type text/plain;
    }

    # REST API — proxied to the backend. proxy_buffering off keeps
    # Server-Sent Events (e.g. /api/v1/logs/stream) flowing in real time.
    location /api/ {
        proxy_pass http://backend:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 3600s;
    }

    # MCP server (streamable HTTP) — same backend, buffering off.
    location /mcp/ {
        proxy_pass http://backend:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 3600s;
    }

    # SPA fallback — every other path serves index.html so client-side
    # routing (TanStack Router) works on hard refresh / deep links.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
