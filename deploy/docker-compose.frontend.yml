# ============================================================================
# Stable edge frontend for blue-green deploys (project: leastaction-edge), managed by
# blue-green-run.sh:
#
#   docker compose -f deploy/docker-compose.frontend.yml -p leastaction-edge up -d
#
# This container is the single entry point (host port 8080 by default) and the
# traffic-switch point: its nginx config is bind-mounted from
# deploy/.runtime/nginx/, which the deploy script rewrites to target the new
# version's backend container before running `nginx -s reload`.
#
# The directory (not the file) is mounted on purpose — single-file bind mounts
# pin the original inode, so rewrites on the host would be invisible inside
# the container.
# ============================================================================
name: leastaction-edge

services:
  frontend:
    image: leastaction-frontend:latest
    pull_policy: never
    container_name: leastaction-frontend
    restart: unless-stopped
    ports:
      - "${LEASTACTION_HTTP_PORT:-8080}:80"
    volumes:
      - ./.runtime/nginx:/etc/nginx/conf.d:ro

networks:
  default:
    name: leastaction_network
    external: true
