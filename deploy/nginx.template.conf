# ============================================================
# Edge nginx template for blue-green deploys — same behavior as
# frontend/nginx.conf, but the backend target is parameterized.
# blue-green-run.sh substitutes __BACKEND_HOST__ with the active
# slot's backend container (e.g. leastaction-green-backend) and writes
# the result to deploy/.runtime/nginx/default.conf, then reloads nginx
# in the leastaction-frontend container to switch traffic.
# ============================================================
server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Allow large payloads (catalog imports, file uploads).
    client_max_body_size 100m;

    # Docker's embedded DNS + proxy_pass via a variable: nginx re-resolves the
    # backend name at request time, so a backend container restart (new IP)
    # keeps working without an nginx reload.
    resolver 127.0.0.11 valid=10s ipv6=off;
    set $leastaction_backend http://__BACKEND_HOST__:8000;

    # Liveness probe for the container healthcheck.
    location = /health {
        return 200 'ok';
        add_header Content-Type text/plain;
    }

    # REST API — proxied to the backend. proxy_buffering off keeps
    # Server-Sent Events (e.g. /api/v1/logs/stream) flowing in real time.
    location /api/ {
        proxy_pass $leastaction_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 3600s;
    }

    # MCP server (streamable HTTP) — same backend, buffering off.
    location /mcp/ {
        proxy_pass $leastaction_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 3600s;
    }

    # SPA fallback — every other path serves index.html so client-side
    # routing (TanStack Router) works on hard refresh / deep links.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
