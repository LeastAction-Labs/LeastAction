name: leastaction

# ============================================================================
# Build locally from source and run:
#   docker compose up -d --build
#
# Zero config required: the RSA signing keys are generated on first run and
# persisted to a volume, and the root login
# defaults to username admin123 / password admin123 (override via env or a .env file).
#
# Open the app at:  http://localhost:8080
# ============================================================================

# All backend/worker services share ONE image, built once by the `backend`
# service and reused by every Celery worker via this tag. Workers have no
# build context of their own, so pull_policy:never stops them trying to pull
# the tag from a registry — they just use the locally built image.
x-backend-image: &backend-image
  image: leastaction:backend
  pull_policy: never

# Shared env for the backend + every Celery worker.
# Only what the code actually reads:
#   REDIS_HOST  — Celery swaps "localhost" in system.yml's broker/result URLs
#                 for this host (src/core/celery/config.py).
#   REDIS_URL   — read directly by change-streamer / keto writer / auth.
#   MONGO_URI   — read by main.py (get_secret) and the change streamer.
#   KETO_*      — read by the keto service.
# Celery broker/result URLs themselves live in config/system.yml, not here.
x-backend-env: &backend-env
  PYTHONUNBUFFERED: "1"
  REDIS_HOST: redis
  REDIS_URL: redis://redis:6379
  MONGO_URI: mongodb://mongodb:27017/LeastActions?replicaSet=rs0
  KETO_READ_URL: http://keto:4466/relation-tuples
  KETO_WRITE_URL: http://keto:4467/admin/relation-tuples/

services:
  # ── Infrastructure ────────────────────────────────────────────────────────
  mongodb:
    image: mongo:7.0
    hostname: mongodb
    restart: unless-stopped
    environment:
      MONGO_INITDB_DATABASE: LeastActions
    command: >
      bash -c "mongod --replSet rs0 --bind_ip_all &
      until mongosh --eval 'db.runCommand({hello: 1})' ; do sleep 2; done &&
      mongosh --eval \"
        try {
          rs.initiate();
          print('Initializing replica set...');
        } catch (e) {
          print('Replica set already initialized, skipping...');
        }

        while (!db.hello().isWritablePrimary) {
          print('Waiting for Primary node...');
          sleep(1000);
        }

        const database = db.getSiblingDB('LeastActions');

        const collections = database.getCollectionNames();
        if (!collections.includes('links')) {
          database.createCollection('links');
          print('Created links collection');
        }

        database.runCommand({
          collMod: 'links',
          changeStreamPreAndPostImages: { enabled: true }
        });
        print('Pre-images enabled for links collection');
      \" &&
      tail -f /dev/null"
    healthcheck:
      test: |
        mongosh --quiet --eval "
        try {
          var status = rs.status();
          if (status.ok) { quit(0); }
        } catch(e) {
          rs.initiate({
            _id: 'rs0',
            members: [{ _id: 0, host: 'mongodb:27017' }]
          });
          quit(0);
        }"
      interval: 5s
      timeout: 10s
      retries: 5
    volumes:
      - mongodb_data:/data/db

  redis:
    image: redis:7
    restart: unless-stopped

  postgres:
    image: postgres:13
    restart: unless-stopped
    environment:
      - POSTGRES_USER=keto
      - POSTGRES_PASSWORD=secret
      - POSTGRES_DB=keto
    volumes:
      - postgres_data:/var/lib/postgresql/data

  keto-migrate:
    image: oryd/keto:v25.4.0
    environment:
      - DSN=postgres://keto:secret@postgres:5432/keto?sslmode=disable&max_conns=20&max_idle_conns=4
    configs:
      - source: keto_yml
        target: /home/ory/keto.yml
      - source: keto_namespaces
        target: /home/ory/namespaces.ts
    command: migrate up -y
    restart: on-failure
    depends_on:
      - postgres

  keto:
    image: oryd/keto:v25.4.0
    restart: unless-stopped
    environment:
      - SERVE_READ_MAX_DEPTH=50
      - DSN=postgres://keto:secret@postgres:5432/keto?sslmode=disable
    configs:
      - source: keto_yml
        target: /home/ory/keto.yml
      - source: keto_namespaces
        target: /home/ory/namespaces.ts
    command: serve all --config /home/ory/keto.yml
    healthcheck:
      test: ["CMD-SHELL", "nc -z 127.0.0.1 4466 || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 10s
    depends_on:
      postgres:
        condition: service_started
      keto-migrate:
        condition: service_completed_successfully

  # ── Application ───────────────────────────────────────────────────────────
  # Generate the RSA keypair used to sign JWTs, once, into a persistent volume.
  # Runs only if the keys aren't already there — like n8n persisting its
  # encryption key. The backend reads keys/{private,public}_key.pem at startup.
  key-init:
    image: alpine:3.20
    command: >
      sh -c "
      apk add --no-cache openssl >/dev/null &&
      if [ ! -f /keys/private_key.pem ]; then
        echo 'Generating RSA keypair...' &&
        openssl genrsa -out /keys/private_key.pem 2048 &&
        openssl rsa -in /keys/private_key.pem -pubout -out /keys/public_key.pem &&
        chown -R 1000:1000 /keys &&
        echo 'Keys generated.';
      else
        echo 'Keys already present, skipping.';
      fi"
    volumes:
      - la_keys:/keys

  backend:
    <<: *backend-image
    build:
      context: .
      dockerfile: backend/Dockerfile
    pull_policy: build
    user: celeryuser
    restart: unless-stopped
    command: >
      .venv/bin/python -m uvicorn main:app
      --host 0.0.0.0
      --port 8000
      --workers 3
    healthcheck:
      test: ["CMD", ".venv/bin/python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/v1/health').status"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 10s
    working_dir: /backend
    volumes:
      - la_logs:/logs
      - la_keys:/backend/keys
    environment:
      <<: *backend-env
      APP_PUBLIC_URL: ${APP_PUBLIC_URL:-http://localhost:8080}
      # If you supply PUBLIC_KEY/PRIVATE_KEY (env or .env), they take priority;
      # otherwise the key-init service's generated keys/*.pem files are used.
      PUBLIC_KEY: ${PUBLIC_KEY:-}
      PRIVATE_KEY: ${PRIVATE_KEY:-}
    depends_on:
      mongodb:
        condition: service_healthy
      redis:
        condition: service_started
      keto:
        condition: service_healthy
      key-init:
        condition: service_completed_successfully

  celery-task-worker:
    <<: *backend-image
    user: celeryuser
    restart: unless-stopped
    command: >
      .venv/bin/celery -A src.core.celery.app worker
      -Q la_tasks
      --loglevel info
      --hostname la-task@%h
    working_dir: /backend
    volumes:
      - la_logs:/logs
      - la_keys:/backend/keys:ro
    environment:
      <<: *backend-env
    depends_on:
      mongodb:
        condition: service_healthy
      redis:
        condition: service_started
      setup-helper:
        condition: service_completed_successfully

  celery-action-worker:
    <<: *backend-image
    user: celeryuser
    restart: unless-stopped
    command: >
      .venv/bin/celery -A src.core.celery.app worker
      -Q la_actions
      --loglevel info
      --hostname la-action@%h
    working_dir: /backend
    volumes:
      - la_logs:/logs
      - la_keys:/backend/keys:ro
    environment:
      <<: *backend-env
    depends_on:
      mongodb:
        condition: service_healthy
      redis:
        condition: service_started
      setup-helper:
        condition: service_completed_successfully

  celery-cron-worker:
    <<: *backend-image
    user: celeryuser
    restart: unless-stopped
    command: >
      .venv/bin/celery -A src.core.celery.app worker
      -Q la_crons
      --loglevel info
      --hostname la-cron@%h
    working_dir: /backend
    volumes:
      - la_logs:/logs
      - la_keys:/backend/keys:ro
    environment:
      <<: *backend-env
    depends_on:
      mongodb:
        condition: service_healthy
      redis:
        condition: service_started
      setup-helper:
        condition: service_completed_successfully

  flower:
    <<: *backend-image
    restart: unless-stopped
    command: >
      .venv/bin/celery -A src.core.celery.app flower
      --port=5555
      --loglevel=info
    working_dir: /backend
    volumes:
      - la_logs:/logs
      - la_keys:/backend/keys:ro
    environment:
      <<: *backend-env
    depends_on:
      mongodb:
        condition: service_healthy
      redis:
        condition: service_started
      setup-helper:
        condition: service_completed_successfully
    ports:
      - "5555:5555"

  keto-access-writer:
    <<: *backend-image
    user: celeryuser
    restart: unless-stopped
    command: .venv/bin/python -m src.core.ee.keto.access_writer
    working_dir: /backend
    environment:
      KETO_READ_URL: http://keto:4466/relation-tuples
      KETO_WRITE_URL: http://keto:4467/admin/relation-tuples/
      REDIS_URL: redis://redis:6379
    volumes:
      - la_logs:/logs
      - la_keys:/backend/keys:ro
    depends_on:
      mongodb:
        condition: service_healthy
      redis:
        condition: service_started
      keto:
        condition: service_healthy

  db-change-streamer:
    <<: *backend-image
    user: celeryuser
    restart: unless-stopped
    command: .venv/bin/python -m src.core.db.change_streams.service
    working_dir: /backend
    volumes:
      - la_logs:/logs
      - la_keys:/backend/keys:ro
    environment:
      REDIS_URL: redis://redis:6379
      MONGO_URI: mongodb://mongodb:27017/LeastActions?replicaSet=rs0
    depends_on:
      mongodb:
        condition: service_healthy
      redis:
        condition: service_started

  setup-helper:
    <<: *backend-image
    user: celeryuser
    command: .venv/bin/python -m setup
    working_dir: /backend
    environment:
      MONGO_URI: mongodb://mongodb:27017/LeastActions?replicaSet=rs0
      KETO_READ_URL: http://keto:4466/relation-tuples
      KETO_WRITE_URL: http://keto:4467/admin/relation-tuples/
      BACKEND_URL: http://backend:8000
      ROOT_EMAIL: ${ROOT_EMAIL:-admin@example.com}
      ROOT_USERNAME: ${ROOT_USERNAME:-admin123}
      ROOT_PASSWORD: ${ROOT_PASSWORD:-admin123}
      # Optional: override the generated keypair (see backend service notes).
      PUBLIC_KEY: ${PUBLIC_KEY:-}
      PRIVATE_KEY: ${PRIVATE_KEY:-}
    volumes:
      - la_logs:/logs
      - la_keys:/backend/keys:ro
    depends_on:
      backend:
        condition: service_healthy
      keto-access-writer:
        condition: service_started
      db-change-streamer:
        condition: service_started

  # ── Frontend (UI + reverse proxy for /api/ and /mcp/) ─────────────────────
  frontend:
    image: leastaction:frontend
    build:
      context: .
      dockerfile: frontend/Dockerfile
    pull_policy: build
    restart: unless-stopped
    ports:
      - "8080:80"
    depends_on:
      backend:
        condition: service_healthy

configs:
  keto_yml:
    content: |
      serve:
        read:
          port: 4466
          host: 0.0.0.0
        write:
          port: 4467
          host: 0.0.0.0
        metrics:
          port: 4468
          host: 0.0.0.0
      limit:
        max_read_depth: 100
      dsn: postgres://keto:secret@postgres:5432/keto?sslmode=disable&max_conns=20&max_idle_conns=4
      namespaces:
        location: file:///home/ory/namespaces.ts
      log:
        level: debug
        format: json
        leak_sensitive_values: true
  keto_namespaces:
    content: |
      import { Namespace, SubjectSet, Context } from "@ory/keto-namespace-types"

      class User implements Namespace {}

      class Group implements Namespace {
          related : {
              owners : User[] ,
              editors : User[] ,
              viewers : User[]
          }
          permits = {
              view : ( ctx : Context ) : boolean =>
                  this.related.owners.includes(ctx.subject) ||
                  this.related.editors.includes(ctx.subject) ||
                  this.related.viewers.includes(ctx.subject) ,
              edit : ( ctx : Context ) : boolean =>
                  this.related.editors.includes(ctx.subject) ||
                  this.related.owners.includes(ctx.subject) ,
          }
      }

      class Item implements Namespace {
          related : {
              owners : ( User | SubjectSet<Group,"owners"> | SubjectSet<Group,"editors"> | SubjectSet<Group,"viewers"> ) [] ,
              viewers : ( User | SubjectSet<Group,"owners"> | SubjectSet<Group,"editors"> | SubjectSet<Group,"viewers"> ) [] ,
              editors : ( User | SubjectSet<Group,"owners"> | SubjectSet<Group,"editors"> | SubjectSet<Group,"viewers"> ) [] ,
              true_parent : Item[] ,
              false_parents : Item[]
          }
          permits = {
              view : ( ctx : Context ) : boolean =>
                  this.related.owners.includes(ctx.subject) ||
                  this.related.editors.includes(ctx.subject) ||
                  this.related.viewers.includes(ctx.subject) ||
                  this.related.true_parent.traverse((parent)=>parent.permits.view(ctx))||
                  this.related.false_parents.traverse((parent)=>parent.permits.view(ctx)),

              edit : ( ctx : Context ) : boolean =>
                  this.related.editors.includes(ctx.subject) ||
                  this.related.owners.includes(ctx.subject) ||
                  this.related.true_parent.traverse((parent)=>parent.permits.edit(ctx)) ,

              true_parent_edit : ( ctx : Context ) : boolean =>
                  this.related.true_parent.traverse((parent)=>parent.permits.edit(ctx)),

              delete : ( ctx : Context ) : boolean =>
                  this.permits.true_parent_edit(ctx) ||
                  this.related.false_parents.traverse((parent)=>parent.permits.edit(ctx)),

              own : (ctx : Context ) : boolean =>
                  this.related.owners.includes(ctx.subject) ||
                  this.related.true_parent.traverse((parent)=>parent.permits.own(ctx)) ,

              is_true_parent : (ctx : Context) : boolean =>
                  this.related.true_parent.includes(ctx.subject) ||
                  this.related.true_parent.traverse((parent)=>parent.permits.is_true_parent(ctx))
          }
      }

volumes:
  mongodb_data:
  postgres_data:
  la_logs:
  la_keys:
